name: medrembours_mobile
description: Application mobile de remboursement médical

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP
  http: ^1.1.0
  dio: ^5.4.0
  
  # State Management
  provider: ^6.1.1
  
  # Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  
  # UI
  google_fonts: ^6.1.0
  cached_network_image: ^3.3.1
  image_picker: ^1.0.7
  flutter_spinkit: ^5.2.0
  shimmer: ^3.0.0
  
  # Utils
  intl: ^0.19.0
  path_provider: ^2.1.2
  file_picker: ^11.0.2

flutter:
  uses-material-design: true