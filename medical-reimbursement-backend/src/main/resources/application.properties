# ============================================
# Application Configuration
# ============================================
spring.application.name=medical-reimbursement

# ============================================
# Database Configuration (PostgreSQL)
# ============================================
spring.datasource.url=jdbc:postgresql://localhost:5432/medical_reimbursement_db
spring.datasource.username=postgres
spring.datasource.password=
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ============================================
# JWT Configuration
# ============================================
jwt.secret=
jwt.expiration=
jwt.refresh-expiration=

# ============================================
# File Upload
# ============================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=50MB
app.upload.dir=./uploads

# ============================================
# Mail Configuration
# ============================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=3000
spring.mail.properties.mail.smtp.writetimeout=5000

# OTP Configuration
app.otp.expiration-minutes=10

# ============================================
# Server
# ============================================
server.port=8089
server.servlet.context-path=/api

# ============================================
# Logging
# ============================================
logging.level.com.pfe.medical=DEBUG
logging.level.org.springframework.security=DEBUG

# ============================================
# Reimbursement Rules (configurable rates)
# ============================================
app.reimbursement.visit-rate=0.70
app.reimbursement.prescription-rate=0.80
app.reimbursement.analysis-rate=0.75
app.reimbursement.scanner-rate=0.65
app.reimbursement.radio-rate=0.65
app.reimbursement.max-amount=5000

sms.mode=prod
twilio.account-sid=ACvotre_sid
twilio.auth-token=votre_token
twilio.from-number=+1votrenuméro

chatbot.provider=groq
chatbot.groq.api-key=
chatbot.groq.model=llama-3.3-70b-versatile

gemini.api.keys[0]=
gemini.api.keys[1]=
gemini.api.keys[2]=
ai.service.url=http://localhost:8001


# application.properties
logging.level.com.pfe.medical.service.impl=DEBUG
logging.level.com.fasterxml.jackson=DEBUG

# ═══════════════════════════════════════════════════════════════
# LOGS POUR DÉBOGUER LES ANALYSES IA
# ═══════════════════════════════════════════════════════════════

# Logs détaillés pour l'analyse IA
logging.level.com.pfe.medical.service.impl.AIAnalysisService=INFO
logging.level.com.pfe.medical.service.impl.DossierService=INFO

# Logs du pool de threads async
logging.level.org.springframework.scheduling=DEBUG

# Logs HTTP (optionnel - pour voir les appels Python)
logging.level.org.springframework.web.client.RestTemplate=DEBUG


